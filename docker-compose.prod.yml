# Production-oriented compose overlay. Use with env file (see README).
services:
  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
      EEG_DATABASE_URL: ${EEG_DATABASE_URL}
      EEG_REDIS_URL: ${EEG_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  worker:
    build: .
    command: celery -A core worker -l info
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      EEG_REDIS_URL: ${EEG_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    restart: unless-stopped
