# Publish to PyPI on push to main
name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # PyPI ships the `eeg` CLI package only. Django console tests live under
      # tests/test_*.py and need requirements.txt — keep them out of this job.
      - name: Run package tests
        run: |
          pytest --import-mode=importlib \
            tests/eeg \
            tests/test_bundle_loader.py \
            tests/test_catalog_loader.py \
            tests/test_cli.py \
            tests/test_prompt_text_extract.py \
            tests/test_runtime_lattice.py \
            tests/test_sarif.py \
            tests/test_scan_fixtures.py \
            tests/test_semantic_trace.py \
            tests/test_text_normalize.py \
            -v --cov=eeg --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publishing (OIDC) - no API token needed
          # Configure at: https://pypi.org/manage/project/eeg-security/settings/publishing/
          skip-existing: true
