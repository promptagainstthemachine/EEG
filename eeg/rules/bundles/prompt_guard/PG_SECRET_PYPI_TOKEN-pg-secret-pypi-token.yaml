eeg_rule_uid: eeg.prompt_surface.hardcoded_secrets.pg-secret-pypi-token
title: PyPI API token detected. PyPI tokens can publish Python packages, enabling suppl
description: 'PyPI API token detected. PyPI tokens can publish Python packages, enabling supply chain attacks on the Python
  ecosystem. Not covered by baseline rules. Source: EEG security catalog'
severity_default: critical
category: hardcoded_secrets
audit_surface:
- instruction_file
- skill_md
- mcp_manifest
- plugin_manifest
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- pypi-[A-Za-z0-9_-]{100,}
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
remediation: 'Remove the hardcoded PyPI token. Use trusted publishing or environment variables. Rotate in your package index account token settings.

  '
