external_source:
  tool: eeg_rule_pack
  original_id: PG_PII_SSN_HARVESTING
  original_title: Skill instructions to collect Social Security Numbers or national ID numbers. Th
  source_version: 1.0.0
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
  notes: EEG prompt-surface rule pack
eeg_rule_uid: eeg.prompt_surface.pii_exposure.pg-pii-ssn-harvesting
title: Skill instructions to collect Social Security Numbers or national ID numbers. Th
description: 'Skill instructions to collect Social Security Numbers or national ID numbers. This is a strong indicator of
  credential harvesting or social engineering. Legitimate skills should never request SSNs. Source: EEG security catalog'
severity_default: critical
category: pii_exposure
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- markdown
- text
patterns:
- (?i)(collect|extract|harvest|gather|capture|log|record|store|save|ask|request|prompt|require)\s+.{0,40}(social\s+security|SSN|social\s+insurance|SIN|national\s+insurance|NI\s+number)
exclude_patterns: []
remediation: 'Remove SSN/national ID collection instructions. Skills should never request government-issued identification
  numbers.

  '
