external_source:
  tool: eeg_rule_pack
  original_id: PG_EXFIL_MARKDOWN_IMAGE
  original_title: Markdown image exfiltration pattern detected. This attack tricks an LLM agent in
  source_version: 1.0.0
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
  notes: EEG prompt-surface rule pack
eeg_rule_uid: eeg.prompt_surface.data_exfiltration.pg-exfil-markdown-image
title: Markdown image exfiltration pattern detected. This attack tricks an LLM agent in
description: 'Markdown image exfiltration pattern detected. This attack tricks an LLM agent into rendering a markdown image
  tag whose URL contains sensitive data as query parameters. When the image is rendered, the data is sent to an attacker-controlled
  server. This is one of the most common LLM-specific exfiltration vectors and is not covered by baseline network-level
  exfil rules. Source: EEG security catalog'
severity_default: critical
category: data_exfiltration
audit_surface:
- session_agent_output
- session_tool_output
asamm:
  primary: AI-06
  secondary:
  - AO-01
  - AD-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- markdown
- text
patterns:
- '!\[([^\]]*)\]\(https?://[^)]{0,200}\{\{?[^}]+\}\}?[^)]*\)'
- '!\[([^\]]*)\]\(https?://[^)]{0,200}\$\{[^}]+\}[^)]*\)'
- '!\[([^\]]*)\]\(https?://[^)]{0,200}\$[A-Za-z_][A-Za-z0-9_]*[^)]*\)'
- (?i)(render|display|show|output|create|generate|insert|embed)\s+(a\s+)?(?:markdown\s+)?(?:image|img|picture)\s+(?:with|where|containing|that\s+includes?)\s+.{0,80}(data|secret|key|token|password|env|variable|context|conversation|history|message)
exclude_patterns: []
remediation: 'Remove instructions that construct markdown images with dynamic data in URLs. Implement output sanitization
  to strip or block markdown images with variable interpolation in URLs.

  '
