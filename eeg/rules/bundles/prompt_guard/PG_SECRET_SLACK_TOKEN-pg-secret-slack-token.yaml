eeg_rule_uid: eeg.prompt_surface.hardcoded_secrets.pg-secret-slack-token
title: Slack bot, user, or app token detected. Leaked Slack tokens can expose workspace
description: 'Slack bot, user, or app token detected. Leaked Slack tokens can expose workspace messages, channels, and files.
  Not covered by baseline rules. Source: EEG security catalog'
severity_default: critical
category: hardcoded_secrets
audit_surface:
- instruction_file
- skill_md
- mcp_manifest
- plugin_manifest
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- xoxb-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24}
- xoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-f0-9]{32}
- xoxe\.xoxp-[0-9]+-[0-9]+-[0-9]+-[a-f0-9]+
- xapp-[0-9]+-[A-Za-z0-9]+-[0-9]+-[a-f0-9]+
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
remediation: 'Remove the hardcoded Slack token. Use environment variables and rotate the token in your Slack app configuration.

  '
