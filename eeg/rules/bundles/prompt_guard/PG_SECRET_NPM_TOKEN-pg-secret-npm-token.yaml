eeg_rule_uid: eeg.prompt_surface.hardcoded_secrets.pg-secret-npm-token
title: npm access token detected. npm tokens can publish packages and modify registry s
description: 'npm access token detected. npm tokens can publish packages and modify registry settings, enabling supply chain
  attacks. Not covered by baseline rules. Source: EEG security catalog'
severity_default: critical
category: hardcoded_secrets
audit_surface:
- instruction_file
- skill_md
- mcp_manifest
- plugin_manifest
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- npm_[A-Za-z0-9]{36}
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
remediation: 'Remove the hardcoded npm token. Use npm login or NPM_TOKEN environment variable. Rotate the token in your JS registry account.

  '
