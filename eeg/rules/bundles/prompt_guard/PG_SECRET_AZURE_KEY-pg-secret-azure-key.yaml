eeg_rule_uid: eeg.prompt_surface.hardcoded_secrets.pg-secret-azure-key
title: Azure Cognitive Services or Azure OpenAI key detected. These keys grant access t
description: 'Azure Cognitive Services or Azure OpenAI key detected. These keys grant access to AI models and can incur significant
  costs. Not covered by baseline rules. Source: EEG security catalog'
severity_default: critical
category: hardcoded_secrets
audit_surface:
- instruction_file
- skill_md
- mcp_manifest
- plugin_manifest
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- (?i)(?:azure|cognitive|openai)[_-]?(?:api)?[_-]?key['"]?\s*[:=]\s*['"]([a-f0-9]{32})['"]
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
- (?i)your.?key
remediation: 'Remove the hardcoded Azure key. Use Azure Key Vault or environment variables. Rotate the key in the Azure Portal.

  '
