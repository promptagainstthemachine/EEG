title: Discord bot token detected. Discord tokens grant full control over a bot account
description: 'Discord bot token detected. Discord tokens grant full control over a bot account and can be used to read messages,
  manage servers, and exfiltrate data. Not covered by baseline rules. Source: EEG security catalog'
severity_default: critical
category: hardcoded_secrets
