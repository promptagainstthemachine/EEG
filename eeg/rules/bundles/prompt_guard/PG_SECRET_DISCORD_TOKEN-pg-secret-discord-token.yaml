  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- '[MN][A-Za-z0-9]{23,}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,}'
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
- (?i)eyJ
remediation: 'Remove the hardcoded Discord token. Use the DISCORD_TOKEN environment variable. Regenerate the token in the
  Discord Developer Portal.

  '
