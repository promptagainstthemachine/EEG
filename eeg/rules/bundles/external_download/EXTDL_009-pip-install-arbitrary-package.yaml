# Severity: low  |  ASAMM: AG-02 (+AI-03,AD-04)
# =============================================================
external_source:
  tool: eeg_rule_pack
  original_id: EXTDL_009
  original_title: pip install arbitrary package
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
eeg_rule_uid: eeg.external_download.pip-install-arbitrary-package
title: pip install arbitrary package
description: Detects pip install of arbitrary packages that modify the host environment
severity_default: low
category: external-download
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AG-02
  secondary:
  - AI-03
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)pip3?\s+install\s+[a-z@][a-z0-9._-]
exclude_patterns:
- type: regex
  value: (?i)pip3?\s+install\s+(-r\s|--requirement\s|-e\s|--editable\s|--upgrade\s+(pip|setuptools|wheel))
- type: contains
  value: '## installation'
- type: contains
  value: '## prerequisites'
- type: contains
  value: '## setup'
- type: contains
  value: '## getting started'
- type: contains
  value: '## requirements'
remediation: Use a virtual environment and pin dependencies in requirements.txt with hashes (pip install --require-hashes).
examples:
  true_positive:
  - pip install firecrawl-py
  - pip3 install browser-use
  false_positive:
  - pip install -r requirements.txt
  - pip install -e .
  - pip install --upgrade pip
  - '## Installation

    pip install requests'
