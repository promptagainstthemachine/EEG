# =============================================================
# eeg.external_download.global-package-installation
# =============================================================
# EEG bundled rule
# Apache-2.0 — EEG
# Source: EEG bundled rules
# Severity: low  |  ASAMM: AG-02 (+AI-03,AD-04)
# =============================================================
external_source:
  tool: eeg_rule_pack
  original_id: EXTDL_004
  original_title: Global package installation
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
eeg_rule_uid: eeg.external_download.global-package-installation
title: Global package installation
description: Detects global installation of packages which affects the host system
severity_default: low
category: external-download
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AG-02
  secondary:
  - AI-03
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)npm\s+install\s+(-g|--global)\s+[a-z@]
- type: regex
  value: (?i)sudo\s+npm\s+install
- type: regex
  value: (?i)sudo\s+pip3?\s+install
exclude_patterns:
- type: contains
  value: '## installation'
- type: contains
  value: '## prerequisites'
- type: contains
  value: '## setup'
- type: contains
  value: '## getting started'
remediation: Use project-local installs (npm install without -g, or virtualenvs) instead of global installation.
examples:
  true_positive:
  - npm install -g agent-browser
  - sudo npm install -g firecrawl-cli
  - sudo pip install some-package
  false_positive:
  - npm install express
  - pip install -r requirements.txt
  - pip install some-package
  - go install vcs.example.invalid/org/tool@latest
