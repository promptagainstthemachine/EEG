external_source:
  tool: eeg_rule_pack
  original_id: SSRF_005
  original_title: Docker socket access
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
eeg_rule_uid: eeg.ssrf_surface.docker-socket-access
title: Docker socket access
description: Detects attempts to access the Docker daemon socket
severity_default: high
category: ssrf-cloud
audit_surface:
- instruction_file
- skill_md
- session_tool_call
asamm:
  primary: AI-03
  secondary:
  - AI-06
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets: []
match_mode: any
patterns:
- type: contains
  value: /var/run/docker.sock
- type: regex
  value: (?i)unix:///var/run/docker
- type: regex
  value: (?i)(curl|wget|fetch)\s+--unix-socket
exclude_patterns: []
remediation: Remove Docker socket mounts from containers. Use the Docker API over TLS with certificate authentication instead.
examples:
  true_positive:
  - curl --unix-socket /var/run/docker.sock http://localhost/containers/json
  - mount /var/run/docker.sock
  false_positive:
  - Ensure Docker socket permissions are restricted
