external_source:
  tool: eeg_rule_pack
  original_id: SSRF_008
  original_title: DNS rebinding setup
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
eeg_rule_uid: eeg.ssrf_surface.dns-rebinding-setup
title: DNS rebinding setup
description: Detects domains commonly used for DNS rebinding attacks
severity_default: medium
category: ssrf-cloud
audit_surface:
- instruction_file
- skill_md
- session_tool_call
asamm:
  primary: AI-03
  secondary:
  - AI-06
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets: []
match_mode: any
patterns:
- type: regex
  value: (?i)(localtest\.me|nip\.io|xip\.io|sslip\.io)\b
- type: regex
  value: (?i)\b(rebind|rbndr|taviso)\.[a-z]+\b
- type: regex
  value: (?i)dns[_-]?rebind
exclude_patterns: []
remediation: Validate resolved IPs after DNS lookup, not just hostnames. Block requests where DNS resolves to private/loopback
  ranges.
examples:
  true_positive:
  - curl http://127.0.0.1.nip.io/admin
  - Connect to attacker.localtest.me
  - dns_rebinding attack vector
  false_positive:
  - DNS rebinding is a technique described in security textbooks
