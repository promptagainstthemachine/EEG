# =============================================================
# eeg.ssrf_surface.cloud-metadata-url
# =============================================================
# EEG bundled rule
# Apache-2.0 — EEG
# Source: EEG bundled rules
# Severity: critical  |  ASAMM: AI-03 (+AI-06,AO-01)
# =============================================================
external_source:
  tool: eeg_rule_pack
  original_id: SSRF_001
  original_title: Cloud metadata URL
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: ""
  license: Apache-2.0 — EEG
eeg_rule_uid: eeg.ssrf_surface.cloud-metadata-url
title: Cloud metadata URL
description: Detects cloud provider metadata endpoint URLs used for SSRF attacks
severity_default: critical
category: ssrf-cloud
audit_surface:
- instruction_file
- skill_md
- session_tool_call
asamm:
  primary: AI-03
  secondary:
  - AI-06
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets: []
match_mode: any
patterns:
- type: regex
  value: (?i)(https?://|curl|wget|fetch|request|get|open)\s*["'(]?\s*https?://169\.254\.169\.254
- type: regex
  value: (?i)https?://metadata\.google\.internal
- type: regex
  value: (?i)https?://169\.254\.170\.2
- type: regex
  value: (?i)https?://(metadata\.azure\.com|instance-data)
exclude_patterns: []
remediation: Block requests to cloud metadata endpoints (169.254.169.254). Use IMDS v2 with hop limit if metadata access is
  required.
examples:
  true_positive:
  - Fetch http://169.254.169.254/latest/meta-data/
  - curl http://metadata.google.internal/computeMetadata/v1/
  false_positive:
  - Block access to 169.254.169.254 in your firewall rules
