{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Edit Profile</h1>
</div>

<div class="panel" style="max-width: 500px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="eeg-input" value="{{ form.username.value }}">
            {{ form.username.errors }}
        </div>
        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" class="eeg-input" value="{{ form.email.value }}">
            {{ form.email.errors }}
        </div>
        <div class="form-group">
            <label for="id_first_name">First Name</label>
            <input type="text" name="first_name" id="id_first_name" class="eeg-input" value="{{ form.first_name.value|default:'' }}">
        </div>
        <div class="form-group">
            <label for="id_last_name">Last Name</label>
            <input type="text" name="last_name" id="id_last_name" class="eeg-input" value="{{ form.last_name.value|default:'' }}">
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
